<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificado Validado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="verification-success">
            <div class="success-badge">
                <span class="checkmark">✓</span>
            </div>
            
            <h1>Certificado Validado com Sucesso!</h1>
            <p class="validation-text" id="validationInfo"></p>
            
            <div class="certificate-display">
                <img id="certificateImage" src="" alt="Certificado AWS" class="certificate-image">
            </div>
            
            <div class="button-group">
                <button class="btn-back" onclick="goBack()">← Validar Outro Certificado</button>
                <button class="btn-download" onclick="downloadCertificate()">⬇ Baixar Certificado</button>
            </div>
            
            <p class="footer-text">Este certificado foi validado e autenticado através do sistema AWS de validação.</p>
        </div>
    </div>

    <script src="script.js?v=20260511b"></script>
</body>
</html>
